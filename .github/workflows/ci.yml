name: CI

on:
  push:
    branches: [main, 'release/v*']
  pull_request:
    branches: [main, 'release/v*']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOTNET_VERSION: '8.0.x'
  CONFIGURATION: Release

permissions:
  contents: read

jobs:
  dotnet:
    name: .NET (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: dotnet
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('dotnet/**/*.csproj', 'dotnet/**/Directory.Build.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Test
        run: dotnet test --configuration ${{ env.CONFIGURATION }} --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          directory: dotnet/coverage
          flags: dotnet
          fail_ci_if_error: false

      - name: Pack
        if: matrix.os == 'ubuntu-latest'
        run: dotnet pack src/FluentCards/FluentCards.csproj --configuration ${{ env.CONFIGURATION }} --no-build --output ./nupkg

      - name: Upload NuGet artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v5
        with:
          name: nuget-package
          path: |
            dotnet/nupkg/*.nupkg
            dotnet/nupkg/*.snupkg

  node:
    name: Node.js (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: node/packages/fluent-cards/tests/coverage/lcov.info
          flags: node
          fail_ci_if_error: false

      - name: Typecheck
        run: npm run typecheck

      - name: Stamp version
        if: matrix.os == 'ubuntu-latest'
        working-directory: node/packages/fluent-cards
        run: ../../node_modules/.bin/nbgv-setversion

      - name: Pack
        if: matrix.os == 'ubuntu-latest'
        working-directory: node/packages/fluent-cards
        run: npm pack

      - name: Reset version
        if: always() && matrix.os == 'ubuntu-latest'
        working-directory: node/packages/fluent-cards
        run: ../../node_modules/.bin/nbgv-setversion --reset

      - name: Upload npm artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v5
        with:
          name: npm-package
          path: node/packages/fluent-cards/*.tgz

  python:
    name: Python ${{ matrix.python-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13']
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest --cov=fluent_cards --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: python/coverage.xml
          flags: python-${{ matrix.python-version }}
          fail_ci_if_error: false

      - name: Install nbgv
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: pip install nbgv-python

      - name: Stamp version
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: |
          VERSION=$(python -c "
          from nbgv_python.runner import NbgvRunner
          from nbgv_python.versioning import normalize_version_field
          ver = NbgvRunner().get_version()
          print(normalize_version_field(ver['semver2'], field='SemVer2'))
          ")
          echo "Stamping version: $VERSION"
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml

      - name: Build distribution
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: |
          pip install build
          python -m build

      - name: Reset version
        if: always() && matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: git checkout -- pyproject.toml

      - name: Upload Python artifacts
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v5
        with:
          name: python-dist
          path: python/dist/*

  go:
    name: Go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: go/go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -coverprofile=coverage.out -covermode=atomic

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: go/coverage.out
          flags: go
          fail_ci_if_error: false
