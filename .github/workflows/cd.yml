name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read

jobs:
  nuget-publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'release/v')
    environment: nuget
    permissions:
      actions: read
      contents: read
    steps:
      - name: Download NuGet artifacts
        uses: actions/download-artifact@v5
        with:
          name: nuget-package
          path: ./nupkg
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Publish to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

  npm-publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'release/v')
    environment: npm
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Download npm artifact
        uses: actions/download-artifact@v5
        with:
          name: npm-package
          path: ./npm-dist
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: npm publish ./npm-dist/*.tgz --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  python-publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'release/v')
    environment: pypi
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Download Python artifacts
        uses: actions/download-artifact@v5
        with:
          name: python-dist
          path: ./python-dist
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python-dist/

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'release/v')
    permissions:
      actions: read
      contents: write
    steps:
      - name: Derive tag name from branch
        id: tag
        run: echo "name=${BRANCH#release/}" >> $GITHUB_OUTPUT
        env:
          BRANCH: ${{ github.event.workflow_run.head_branch }}

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          target_commitish: ${{ github.event.workflow_run.head_sha }}
          generate_release_notes: true
          files: |
            artifacts/nuget-package/*.nupkg
            artifacts/nuget-package/*.snupkg
            artifacts/npm-package/*.tgz
            artifacts/python-dist/*

  go-tag:
    name: Tag Go module release
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'release/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Derive Go module tag
        id: version
        run: echo "tag=go/${BRANCH#release/}" >> $GITHUB_OUTPUT
        env:
          BRANCH: ${{ github.event.workflow_run.head_branch }}

      - name: Create Go module tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }} ${{ github.event.workflow_run.head_sha }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Trigger pkg.go.dev indexing
        run: |
          curl -s "https://sum.golang.org/lookup/github.com/rido-min/FluentCards/go@${{ steps.version.outputs.tag }}" || true
